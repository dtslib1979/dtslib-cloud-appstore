<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="DTSLIB Studio — Chrome 무료 엔진으로 방송 소재를 만드는 개인 제작 환경">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
    <title>DTSLIB Tools</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #000;
            --bg-card: #1C1C1E;
            --bg-card-hover: #2C2C2E;
            --accent: #0A84FF;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.2);
            --text: #F5F5F7;
            --text-sec: rgba(245,245,247,0.6);
            --text-dim: rgba(245,245,247,0.35);
            --green: #30D158;
            --red: #FF453A;
            --yellow: #FFD60A;
            --grid-cols: 2;
            --max-width: 600px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.5; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: calc(52px + env(safe-area-inset-top)) 0 0;
        }

        .page { max-width: var(--max-width); margin: 0 auto; padding: 24px 20px 60px; }

        /* ── Header ── */
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .page-title span { color: var(--accent); }
        .page-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }

        /* ── Stats ── */
        .stats-bar {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
        }
        .stat-pill {
            display: flex; align-items: center; gap: 5px;
            padding: 5px 12px; background: var(--bg-card);
            border-radius: 100px; font-size: 11px; color: var(--text-sec);
        }
        .stat-pill .sv { color: var(--accent); font-weight: 600; }

        /* ── Factory Bar ── */
        .factory-bar {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 10px 14px; margin-bottom: 16px;
            background: var(--bg-card); border-radius: 12px; font-size: 12px;
        }
        .factory-bar.off { color: var(--yellow); }
        .factory-bar.on { color: var(--green); }

        .fb-btn {
            padding: 5px 14px; border-radius: 100px;
            border: 1px solid var(--accent); background: transparent;
            color: var(--accent); font-family: inherit;
            font-size: 11px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .fb-btn:hover { background: var(--accent); color: #000; }
        .fb-btn.dim {
            border-color: var(--border); color: var(--text-dim);
        }
        .fb-btn.dim:hover { border-color: var(--border-hover); color: var(--text-sec); }

        /* ── Category Filter ── */
        .cat-filter {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .cat-pill {
            padding: 5px 14px; border-radius: 100px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-sec); font-family: inherit;
            font-size: 11px; font-weight: 500; cursor: pointer;
            transition: all 0.2s;
        }
        .cat-pill:hover { border-color: var(--border-hover); color: var(--text); }
        .cat-pill.active {
            background: var(--accent); border-color: var(--accent);
            color: #000; font-weight: 600;
        }

        /* ── Group Headers ── */
        .group { margin-bottom: 24px; }
        .group-title {
            font-size: 11px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            padding-left: 4px; margin-bottom: 8px;
        }

        /* ── Tool Grid ── */
        .tools-grid {
            display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 10px;
        }

        .tool-card {
            display: flex; flex-direction: column;
            padding: 16px 14px; background: var(--bg-card);
            border-radius: 14px; text-decoration: none; color: inherit;
            transition: transform 0.2s, background 0.2s;
        }
        .tool-card:hover { background: var(--bg-card-hover); }
        .tool-card:active { transform: scale(0.97); }
        .tool-card.hidden { display: none; }

        .tool-icon { font-size: 28px; margin-bottom: 10px; }
        .tool-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .tool-desc { font-size: 11px; color: var(--text-sec); line-height: 1.4; }
        .tool-meta {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: auto; padding-top: 10px;
        }
        .tool-ver { font-size: 10px; color: var(--text-dim); }
        .tool-cat {
            font-size: 9px; font-weight: 600; padding: 1px 8px;
            border-radius: 100px; border: 1px solid; letter-spacing: 0.04em;
        }
        .tool-pwa-badge {
            font-size: 8px; font-weight: 700; padding: 1px 6px;
            border-radius: 100px; background: #30D158; color: #000;
            letter-spacing: 0.06em; margin-left: 6px;
        }

        /* ── Pipeline ── */
        .pipeline-section { margin-bottom: 20px; }
        .pipe-header {
            font-size: 11px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px; padding-left: 4px;
        }
        .pipe-input-row {
            display: flex; gap: 8px; margin-bottom: 10px;
        }
        .pipe-input-row input, .pipe-input-row select {
            flex: 1; padding: 9px 12px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-family: inherit; font-size: 12px; outline: none;
        }
        .pipe-input-row input:focus, .pipe-input-row select:focus { border-color: var(--accent); }
        .pipe-input-row input::placeholder { color: var(--text-dim); }
        .pipe-input-row button {
            padding: 9px 16px; border-radius: 10px; border: none;
            background: var(--accent); color: #000;
            font-family: inherit; font-size: 12px; font-weight: 600;
            cursor: pointer; white-space: nowrap;
        }
        .pipe-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

        .pipe-stages { display: flex; flex-direction: column; gap: 0; }
        .pipe-step {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-left: 2px solid var(--border);
            margin-left: 9px; position: relative;
        }
        .pipe-step.active { border-left-color: var(--accent); }
        .pipe-step.done { border-left-color: var(--green); }
        .pipe-step.fail { border-left-color: var(--red); }
        .pipe-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid var(--border); background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; flex-shrink: 0; position: absolute; left: -11px;
        }
        .pipe-step.active .pipe-dot { border-color: var(--accent); background: var(--accent); color: #000; }
        .pipe-step.done .pipe-dot { border-color: var(--green); background: var(--green); color: #fff; }
        .pipe-step.fail .pipe-dot { border-color: var(--red); background: var(--red); color: #fff; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pipe-step.active .pipe-dot::after {
            content: ''; position: absolute; inset: -4px;
            border: 2px solid transparent; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        .pipe-info { flex: 1; min-width: 0; padding-left: 16px; }
        .pipe-label { font-size: 12px; font-weight: 600; }
        .pipe-detail { font-size: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pipe-step.done .pipe-detail { color: var(--green); }
        .pipe-step.fail .pipe-detail { color: var(--red); }
        .pipe-badge {
            font-size: 9px; font-weight: 600; padding: 2px 8px;
            border-radius: 100px; flex-shrink: 0;
        }
        .pipe-badge.idle { background: rgba(255,255,255,0.05); color: var(--text-dim); }
        .pipe-badge.running { background: rgba(10,132,255,0.15); color: var(--accent); }
        .pipe-badge.ok { background: rgba(48,209,88,0.15); color: var(--green); }
        .pipe-badge.err { background: rgba(255,69,58,0.15); color: var(--red); }
        .pipe-output {
            margin-top: 8px; padding: 10px 12px; background: #000;
            border: 1px solid var(--border); border-radius: 10px;
            font-size: 10px; color: var(--text-dim); font-family: monospace;
            line-height: 1.7; max-height: 120px; overflow-y: auto; display: none;
        }
        .pipe-output.show { display: block; }
        .pipe-output .ok { color: var(--green); }
        .pipe-output .err { color: var(--red); }
        .pipe-output .warn { color: var(--yellow); }

        /* ── Footer ── */
        .footer {
            text-align: center; padding: 20px;
            border-top: 1px solid var(--border); margin-top: 16px;
        }
        .footer a { font-size: 12px; color: var(--accent); text-decoration: none; }
        .footer-brand {
            font-size: 10px; color: var(--text-dim);
            letter-spacing: 0.1em; margin-top: 6px;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.8); align-items: center;
            justify-content: center; padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #1C1C1E; border-radius: 16px; padding: 24px;
            width: 100%; max-width: 380px;
        }
        .modal-box h3 {
            font-size: 18px; font-weight: 700; margin-bottom: 16px;
        }
        .modal-box label {
            display: block; font-size: 11px; color: var(--text-sec);
            margin-bottom: 4px;
        }
        .modal-box input, .modal-box select {
            width: 100%; padding: 10px 12px; margin-bottom: 12px;
            background: #000; border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-family: inherit; font-size: 14px; outline: none;
        }
        .modal-box input:focus, .modal-box select:focus {
            border-color: var(--accent);
        }
        .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
        .modal-actions button {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .m-primary { background: var(--accent); color: #000; }
        .m-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .m-cancel { background: #333; color: var(--text-sec); }
        .progress-log {
            font-size: 11px; color: var(--text-dim); margin-top: 10px;
            line-height: 1.8; font-family: monospace;
        }
        .progress-log .ok { color: var(--green); }
        .progress-log .err { color: var(--red); }
        .progress-log .wait { color: var(--yellow); }
    </style>
</head>
<body>
    <div class="page">
        <div id="header"></div>
        <div id="statsBar"></div>
        <div id="factoryBar"></div>
        <div id="pipelineSection"></div>
        <div id="catFilter"></div>
        <div id="toolsContainer"></div>
        <div class="footer" id="footer"></div>
    </div>

    <!-- Token Modal -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal-box">
            <h3>GitHub Connect</h3>
            <label>Personal Access Token (repo scope)</label>
            <input type="password" id="tokenInput" placeholder="ghp_..." />
            <div class="modal-actions">
                <button class="m-primary" onclick="F.saveToken()">Connect</button>
                <button class="m-cancel" onclick="F.closeModal('tokenModal')">Cancel</button>
            </div>
            <div id="tokenStatus" class="progress-log"></div>
        </div>
    </div>

    <!-- New Tool Modal -->
    <div class="modal-overlay" id="newToolModal">
        <div class="modal-box">
            <h3>New Tool</h3>
            <label>Tool Name</label>
            <input type="text" id="ntName" placeholder="My Tool" />
            <label>Category</label>
            <select id="ntCat"></select>
            <label>Description</label>
            <input type="text" id="ntDesc" placeholder="What does it do" />
            <label>Icon Emoji</label>
            <input type="text" id="ntEmoji" placeholder="🔧" maxlength="4" />
            <label>Type</label>
            <select id="ntType">
                <option value="webapp">Web App</option>
                <option value="pwa">PWA (오프라인/설치)</option>
            </select>
            <div class="modal-actions">
                <button class="m-primary" id="ntSubmit" onclick="F.createTool()">Create & Deploy</button>
                <button class="m-cancel" onclick="F.closeModal('newToolModal')">Cancel</button>
            </div>
            <div id="createProgress" class="progress-log"></div>
        </div>
    </div>

    <script>
    var F = (function() {
        var config, tools;
        var GH = {};
        var TK = 'dtstools_gh_token';

        // Category label map
        var CAT_LABELS = { video: '영상', audio: '오디오', image: '이미지', util: '유틸', game: '게임' };
        var CAT_ORDER = ['video', 'audio', 'image', 'util', 'game'];

        // ── Init ──
        Promise.all([
            fetch('./dashboard-config.json').then(function(r) {
                if (!r.ok) throw new Error('config: ' + r.status);
                return r.json();
            }),
            fetch('./apps.json').then(function(r) {
                if (!r.ok) throw new Error('apps: ' + r.status);
                return r.json();
            })
        ]).then(function(res) {
            config = res[0]; tools = res[1].apps || [];
            GH = config.github || {};
            applyTheme(config.theme);
            renderHeader(config.brand, tools.length);
            if (config.sections.stats) renderStats(config.stats);
            renderFactoryBar();
            renderPipeline();
            if (config.sections.categoryFilter) renderCatFilter(config.categories);
            renderTools(tools, config.categories);
            renderFooter(config.brand);
        }).catch(function(err) {
            document.querySelector('.page').innerHTML =
                '<p style="color:var(--red);text-align:center;padding:80px 20px;">' +
                'Failed to load: ' + err.message + '</p>';
        });

        function applyTheme(t) {
            var s = document.documentElement.style;
            var m = {bg:'bg',bgCard:'bg-card',bgCardHover:'bg-card-hover',
                accent:'accent',border:'border',borderHover:'border-hover',
                text:'text',textSecondary:'text-sec',textMuted:'text-dim'};
            Object.keys(m).forEach(function(k) { if (t[k]) s.setProperty('--'+m[k], t[k]); });
        }

        function renderHeader(b, count) {
            document.getElementById('header').innerHTML =
                '<h1 class="page-title">' + b.name + ' <span>' + b.highlight + '</span></h1>' +
                '<p class="page-sub">' + count + ' studio tools — browser-native runtime</p>';
            document.title = b.name + ' ' + b.highlight;
        }

        function renderStats(st) {
            var pwaHtml = st.pwa_tools ? '<div class="stat-pill"><span class="sv">' + st.pwa_tools + '</span> PWA</div>' : '';
            document.getElementById('statsBar').innerHTML =
                '<div class="stats-bar">' +
                '<div class="stat-pill"><span class="sv">' + st.total_tools + '</span> Tools</div>' +
                '<div class="stat-pill"><span class="sv">' + st.categories_count + '</span> Categories</div>' +
                '<div class="stat-pill"><span class="sv">' + st.ffmpeg_tools + '</span> FFmpeg</div>' +
                pwaHtml +
                '</div>';
        }

        function renderFactoryBar() {
            var el = document.getElementById('factoryBar');
            if (!ht()) {
                el.innerHTML = '<div class="factory-bar off">' +
                    '<span>Connect GitHub to add studio tools</span>' +
                    '<button class="fb-btn" onclick="F.openModal(\'tokenModal\')">Connect</button></div>';
            } else {
                el.innerHTML = '<div class="factory-bar on">' +
                    '<span>Factory Online</span>' +
                    '<button class="fb-btn" onclick="F.openModal(\'newToolModal\')">+ New Tool</button>' +
                    '<button class="fb-btn dim" onclick="F.openModal(\'tokenModal\')">&#9881;</button></div>';
            }
        }

        function renderCatFilter(cats) {
            var html = '<div class="cat-filter">';
            var keys = Object.keys(cats);
            keys.forEach(function(k) {
                var a = k === 'all' ? ' active' : '';
                html += '<button class="cat-pill' + a + '" data-cat="' + k + '">' + cats[k].label + '</button>';
            });
            html += '</div>';
            document.getElementById('catFilter').innerHTML = html;
            document.querySelectorAll('.cat-pill').forEach(function(b) {
                b.addEventListener('click', function() {
                    document.querySelectorAll('.cat-pill').forEach(function(x) { x.classList.remove('active'); });
                    b.classList.add('active');
                    var cat = b.getAttribute('data-cat');
                    document.querySelectorAll('.tool-card').forEach(function(c) {
                        c.classList.toggle('hidden', cat !== 'all' && c.getAttribute('data-cat') !== cat);
                    });
                });
            });
        }

        function renderTools(tools, cats) {
            var groups = {};
            tools.forEach(function(t) {
                var cat = t.category || 'util';
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(t);
            });

            var html = '';
            CAT_ORDER.forEach(function(cat) {
                if (!groups[cat]) return;
                var label = CAT_LABELS[cat] || cat;
                html += '<div class="group"><div class="group-title">' + label + '</div><div class="tools-grid">';
                groups[cat].forEach(function(t) {
                    var cc = cats[t.category] || { color: '#0A84FF' };
                    var pwaBadge = t.type === 'pwa' ? '<span class="tool-pwa-badge">PWA</span>' : '';
                    html += '<a href="./' + t.id + '/" class="tool-card" data-cat="' + t.category + '">' +
                        '<div class="tool-icon">' + t.icon + '</div>' +
                        '<div class="tool-name">' + t.name + pwaBadge + '</div>' +
                        '<div class="tool-desc">' + t.desc + '</div>' +
                        '<div class="tool-meta">' +
                        '<span class="tool-ver">v' + t.version + '</span>' +
                        '<span class="tool-cat" style="color:' + cc.color + ';border-color:' + cc.color + '44">' + label + '</span>' +
                        '</div></a>';
                });
                html += '</div></div>';
            });
            document.getElementById('toolsContainer').innerHTML = html;
        }

        // ── Pipeline ──
        var PIPE_STAGES = [
            { num: 1, name: 'Spec', icon: '📋', desc: 'Tool name, type, category' },
            { num: 2, name: 'Scaffold', icon: '🏗️', desc: 'HTML + CSS + JS skeleton' },
            { num: 3, name: 'Register', icon: '📝', desc: 'apps.json entry' },
            { num: 4, name: 'PWA', icon: '📦', desc: 'manifest.json + sw.js (if PWA)' },
            { num: 5, name: 'Deploy', icon: '🚀', desc: 'GitHub Pages auto-deploy' }
        ];

        function renderPipeline() {
            if (!ht()) {
                document.getElementById('pipelineSection').innerHTML = '';
                return;
            }
            var h = '<div class="pipeline-section">' +
                '<div class="pipe-header">Tool Pipeline</div>' +
                '<div class="pipe-input-row">' +
                '<input type="text" id="pipeName" placeholder="Tool name (e.g. My Tool)" />' +
                '<select id="pipeType" style="flex:0.6"><option value="webapp">WebApp</option><option value="pwa">PWA</option></select>' +
                '</div>' +
                '<div class="pipe-input-row">' +
                '<select id="pipeCat" style="flex:0.5"></select>' +
                '<input type="text" id="pipeDesc" placeholder="Description" />' +
                '<button id="pipeStart" onclick="F.startPipeline()">Run</button>' +
                '</div>';
            h += '<div class="pipe-stages">';
            PIPE_STAGES.forEach(function(s) {
                h += '<div class="pipe-step" id="ps-' + s.num + '">' +
                    '<div class="pipe-dot">' + s.num + '</div>' +
                    '<div class="pipe-info"><div class="pipe-label">' + s.icon + ' ' + s.name + '</div>' +
                    '<div class="pipe-detail" id="pd-' + s.num + '">' + s.desc + '</div></div>' +
                    '<span class="pipe-badge idle" id="pb-' + s.num + '">IDLE</span></div>';
            });
            h += '</div><div class="pipe-output" id="pipeLog"></div></div>';
            document.getElementById('pipelineSection').innerHTML = h;

            // populate category select
            var sel = document.getElementById('pipeCat');
            CAT_ORDER.forEach(function(k) {
                var opt = document.createElement('option');
                opt.value = k; opt.textContent = CAT_LABELS[k] || k;
                sel.appendChild(opt);
            });
        }

        function psSet(num, state, detail) {
            var step = document.getElementById('ps-' + num);
            var badge = document.getElementById('pb-' + num);
            var det = document.getElementById('pd-' + num);
            step.className = 'pipe-step ' + state;
            if (state === 'active') { badge.className = 'pipe-badge running'; badge.textContent = 'RUN'; }
            else if (state === 'done') { badge.className = 'pipe-badge ok'; badge.textContent = 'DONE'; }
            else if (state === 'fail') { badge.className = 'pipe-badge err'; badge.textContent = 'FAIL'; }
            if (detail) det.textContent = detail;
        }

        function pLog(msg, cls) {
            var el = document.getElementById('pipeLog');
            el.classList.add('show');
            el.innerHTML += '<span class="' + (cls || '') + '">' + msg + '</span><br>';
            el.scrollTop = el.scrollHeight;
        }

        function startPipeline() {
            var name = document.getElementById('pipeName').value.trim();
            var type = document.getElementById('pipeType').value;
            var cat = document.getElementById('pipeCat').value;
            var desc = document.getElementById('pipeDesc').value.trim();
            if (!name) return;

            var id = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            var emoji = '🔧';
            var btn = document.getElementById('pipeStart');
            btn.disabled = true;
            document.getElementById('pipeLog').innerHTML = '';

            pLog('Pipeline: ' + name + ' (' + type + ')', 'warn');

            // S1: Spec validation
            psSet(1, 'active', 'Validating...');
            pLog('S1: Validating spec...', '');
            if (!id || !desc) {
                psSet(1, 'fail', 'Name and description required');
                pLog('S1: ✗ Missing fields', 'err');
                btn.disabled = false;
                return;
            }
            psSet(1, 'done', name + ' / ' + type + ' / ' + cat);
            pLog('S1: ✓ Spec validated', 'ok');

            // S2: Scaffold
            psSet(2, 'active', 'Creating files...');
            pLog('S2: Reading apps.json...', '');

            api('GET', gp('/contents/apps.json'))
            .then(function(file) {
                var content = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
                var data = JSON.parse(content);

                // Check duplicate
                var exists = data.apps.some(function(a) { return a.id === id; });
                if (exists) {
                    psSet(2, 'fail', 'Tool "' + id + '" already exists');
                    pLog('S2: ✗ Duplicate tool ID', 'err');
                    btn.disabled = false;
                    return Promise.reject('__STOP__');
                }

                // Build scaffold HTML
                var manifestLink = type === 'pwa' ? '    <link rel="manifest" href="manifest.json">\n' : '';
                var swScript = type === 'pwa'
                    ? '    <script>if(\'serviceWorker\' in navigator) navigator.serviceWorker.register(\'sw.js\');</' + 'script>\n' : '';
                var scaffold =
                    '<!DOCTYPE html>\n<html lang="ko">\n<head>\n' +
                    '    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
                    '    <meta name="theme-color" content="#000">\n' + manifestLink +
                    '    <title>' + name + '</title>\n' +
                    '    <link rel="stylesheet" href="style.css">\n' +
                    '</head>\n<body>\n    <div class="app">\n' +
                    '        <h1>' + emoji + ' ' + name + '</h1>\n' +
                    '        <p class="desc">' + desc + '</p>\n' +
                    '        <div class="main-area">Tool ready</div>\n' +
                    '    </div>\n    <script src="app.js"></' + 'script>\n' +
                    '    <script src="../shared/js/nav.js"></' + 'script>\n' + swScript +
                    '</body>\n</html>\n';

                var encHtml = btoa(unescape(encodeURIComponent(scaffold)));
                pLog('S2: Creating ' + id + '/index.html...', '');

                return api('PUT', gp('/contents/' + id + '/index.html'), {
                    message: 'pipeline(s2): scaffold ' + name + ' index.html',
                    content: encHtml
                }).then(function() {
                    // style.css
                    var css = 'body { background: #000; color: #f5f5f7; font-family: -apple-system, sans-serif; margin: 0; padding: 60px 20px 40px; }\n' +
                        '.app { max-width: 600px; margin: 0 auto; }\nh1 { font-size: 24px; margin-bottom: 8px; }\n' +
                        '.desc { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 24px; }\n' +
                        '.main-area { text-align: center; padding: 60px 20px; background: #1C1C1E; border-radius: 14px; color: rgba(255,255,255,0.3); }\n';
                    var encCss = btoa(unescape(encodeURIComponent(css)));
                    pLog('S2: Creating style.css...', '');
                    return api('PUT', gp('/contents/' + id + '/style.css'), {
                        message: 'pipeline(s2): scaffold ' + name + ' style.css',
                        content: encCss
                    });
                }).then(function() {
                    // app.js
                    var js = '// ' + name + '\nconsole.log("' + name + ' loaded");\n';
                    var encJs = btoa(unescape(encodeURIComponent(js)));
                    pLog('S2: Creating app.js...', '');
                    return api('PUT', gp('/contents/' + id + '/app.js'), {
                        message: 'pipeline(s2): scaffold ' + name + ' app.js',
                        content: encJs
                    });
                }).then(function() {
                    psSet(2, 'done', 'index.html + style.css + app.js');
                    pLog('S2: ✓ Scaffold created', 'ok');
                    return { data: data, sha: file.sha };
                });
            })
            .then(function(ctx) {
                if (!ctx) return;
                // S3: Register in apps.json
                psSet(3, 'active', 'Updating apps.json...');
                pLog('S3: Adding to apps.json...', '');

                ctx.data.apps.push({
                    id: id, name: name, desc: desc,
                    icon: emoji, version: '1.0', category: cat, type: type
                });
                var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(ctx.data, null, 2) + '\n')));

                return api('PUT', gp('/contents/apps.json'), {
                    message: 'pipeline(s3): register ' + name,
                    content: encoded, sha: ctx.sha
                }).then(function() {
                    psSet(3, 'done', 'apps.json updated');
                    pLog('S3: ✓ Registered', 'ok');
                    return type;
                });
            })
            .then(function(t) {
                if (!t) return;
                // S4: PWA files (if type=pwa)
                if (t !== 'pwa') {
                    psSet(4, 'done', 'Skipped (webapp)');
                    pLog('S4: Skipped — webapp type', '');
                    return true;
                }

                psSet(4, 'active', 'Creating PWA files...');
                pLog('S4: Creating manifest.json...', '');

                var manifest = JSON.stringify({
                    name: name, short_name: name,
                    start_url: './', display: 'standalone',
                    background_color: '#000', theme_color: '#000',
                    icons: [
                        { src: '../assets/icon-192.png', sizes: '192x192', type: 'image/png' },
                        { src: '../assets/icon-512.png', sizes: '512x512', type: 'image/png' }
                    ]
                }, null, 2) + '\n';
                var encM = btoa(unescape(encodeURIComponent(manifest)));

                return api('PUT', gp('/contents/' + id + '/manifest.json'), {
                    message: 'pipeline(s4): PWA manifest for ' + name,
                    content: encM
                }).then(function() {
                    pLog('S4: Creating sw.js...', '');
                    var sw = "var CACHE='" + id + "-v1';\nvar ASSETS=['./','./index.html','./style.css','./app.js'];\n" +
                        "self.addEventListener('install',function(e){e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(ASSETS)}))});\n" +
                        "self.addEventListener('fetch',function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request)}))});\n";
                    var encSw = btoa(unescape(encodeURIComponent(sw)));
                    return api('PUT', gp('/contents/' + id + '/sw.js'), {
                        message: 'pipeline(s4): service worker for ' + name,
                        content: encSw
                    });
                }).then(function() {
                    psSet(4, 'done', 'manifest.json + sw.js');
                    pLog('S4: ✓ PWA files created', 'ok');
                    return true;
                });
            })
            .then(function(ok) {
                if (!ok) return;
                // S5: Deploy
                psSet(5, 'active', 'Deploying...');
                pLog('S5: GitHub Pages auto-deploys on push — verifying...', 'warn');

                // Each PUT already pushed to main → Pages auto-deploys
                setTimeout(function() {
                    psSet(5, 'done', 'Live at /' + id + '/');
                    var url = 'https://dtslib1979.github.io/dtslib-cloud-appstore/' + id + '/';
                    pLog('S5: ✓ Deployed → ' + url, 'ok');
                    pLog('━━━ Pipeline complete ✓ ━━━', 'ok');
                    btn.disabled = false;
                }, 2000);
            })
            .catch(function(err) {
                if (err === '__STOP__') { btn.disabled = false; return; }
                pLog('✗ ' + err.message, 'err');
                btn.disabled = false;
            });
        }

        function renderFooter(b) {
            document.getElementById('footer').innerHTML =
                '<a href="' + b.githubUrl + '" target="_blank">GitHub</a>' +
                '<div class="footer-brand">' + b.footer + '</div>';
        }

        // ── Token ──
        function gt() { return localStorage.getItem(TK); }
        function ht() { return !!gt(); }

        function api(method, path, body) {
            var h = { 'Accept': 'application/vnd.github.v3+json' };
            if (gt()) h['Authorization'] = 'Bearer ' + gt();
            if (body) h['Content-Type'] = 'application/json';
            return fetch('https://api.github.com' + path, {
                method: method, headers: h,
                body: body ? JSON.stringify(body) : undefined
            }).then(function(r) {
                if (r.status === 204) return null;
                return r.json().then(function(d) {
                    if (!r.ok) throw new Error(d.message || r.status);
                    return d;
                });
            });
        }

        function gp(p) { return '/repos/' + GH.owner + '/' + GH.repo + p; }

        // ── Factory: Create Tool ──
        function createTool() {
            var name = document.getElementById('ntName').value.trim();
            var cat = document.getElementById('ntCat').value;
            var desc = document.getElementById('ntDesc').value.trim();
            var emoji = document.getElementById('ntEmoji').value.trim() || '🔧';
            var type = document.getElementById('ntType').value;
            if (!name) return;

            var id = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            var log = document.getElementById('createProgress');
            var btn = document.getElementById('ntSubmit');
            btn.disabled = true;
            log.innerHTML = '<span class="wait">● Reading apps.json...</span>';

            // Step 1: Update apps.json
            api('GET', gp('/contents/apps.json'))
            .then(function(file) {
                var content = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
                var data = JSON.parse(content);
                data.apps.push({
                    id: id, name: name, desc: desc,
                    icon: emoji, version: '1.0', category: cat, type: type
                });
                var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2) + '\n')));
                log.innerHTML += '<br><span class="ok">✓ Read</span><br><span class="wait">● Registering...</span>';
                return api('PUT', gp('/contents/apps.json'), {
                    message: 'feat: register ' + name,
                    content: encoded, sha: file.sha
                });
            })
            .then(function() {
                log.innerHTML += '<br><span class="ok">✓ Registered</span><br><span class="wait">● Scaffolding tool...</span>';

                // Step 2: Create tool index.html
                var manifestLink = type === 'pwa' ? '    <link rel="manifest" href="manifest.json">\n' : '';
                var swScript = type === 'pwa'
                    ? '    <script>if(\'serviceWorker\' in navigator) navigator.serviceWorker.register(\'sw.js\');</' + 'script>\n'
                    : '';
                var scaffold =
                    '<!DOCTYPE html>\n<html lang="ko">\n<head>\n' +
                    '    <meta charset="UTF-8">\n' +
                    '    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
                    '    <meta name="theme-color" content="#000">\n' +
                    manifestLink +
                    '    <title>' + name + '</title>\n' +
                    '    <style>\n' +
                    '        body { background: #000; color: #f5f5f7; font-family: -apple-system, sans-serif; margin: 0; padding: 60px 20px 40px; }\n' +
                    '        .app { max-width: 600px; margin: 0 auto; }\n' +
                    '        h1 { font-size: 24px; margin-bottom: 8px; }\n' +
                    '        .desc { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 24px; }\n' +
                    '        .placeholder { text-align: center; padding: 60px 20px; background: #1C1C1E; border-radius: 14px; color: rgba(255,255,255,0.3); }\n' +
                    '    </style>\n</head>\n<body>\n' +
                    '    <div class="app">\n' +
                    '        <h1>' + emoji + ' ' + name + '</h1>\n' +
                    '        <p class="desc">' + desc + '</p>\n' +
                    '        <div class="placeholder">Tool scaffold — develop here</div>\n' +
                    '    </div>\n' +
                    '    <script src="../shared/js/nav.js"></' + 'script>\n' +
                    swScript +
                    '</body>\n</html>\n';

                var encoded = btoa(unescape(encodeURIComponent(scaffold)));
                return api('PUT', gp('/contents/' + id + '/index.html'), {
                    message: 'feat: scaffold ' + name,
                    content: encoded
                });
            })
            .then(function() {
                if (type !== 'pwa') {
                    log.innerHTML += '<br><span class="ok">✓ Scaffolded</span><br>' +
                        '<span class="ok"><b>Done! Push triggers GitHub Pages deploy.</b></span>';
                    btn.disabled = false;
                    return;
                }
                log.innerHTML += '<br><span class="ok">✓ Scaffolded</span><br><span class="wait">● Creating manifest.json...</span>';

                // Step 3 (PWA only): Create manifest.json
                var manifest = JSON.stringify({
                    name: name, short_name: name,
                    start_url: './', display: 'standalone',
                    background_color: '#000', theme_color: '#000',
                    icons: [
                        { src: '../assets/icon-192.png', sizes: '192x192', type: 'image/png' },
                        { src: '../assets/icon-512.png', sizes: '512x512', type: 'image/png' }
                    ]
                }, null, 2) + '\n';
                var encManifest = btoa(unescape(encodeURIComponent(manifest)));
                return api('PUT', gp('/contents/' + id + '/manifest.json'), {
                    message: 'feat: PWA manifest for ' + name,
                    content: encManifest
                }).then(function() {
                    log.innerHTML += '<br><span class="ok">✓ manifest.json</span><br><span class="wait">● Creating sw.js...</span>';

                    // Step 4 (PWA only): Create sw.js
                    var sw = "var CACHE = '" + id + "-v1';\n" +
                        "var ASSETS = ['./index.html', './style.css', './app.js'];\n" +
                        "self.addEventListener('install', function(e) {\n" +
                        "  e.waitUntil(caches.open(CACHE).then(function(c) { return c.addAll(ASSETS); }));\n" +
                        "});\n" +
                        "self.addEventListener('fetch', function(e) {\n" +
                        "  e.respondWith(caches.match(e.request).then(function(r) { return r || fetch(e.request); }));\n" +
                        "});\n";
                    var encSw = btoa(unescape(encodeURIComponent(sw)));
                    return api('PUT', gp('/contents/' + id + '/sw.js'), {
                        message: 'feat: service worker for ' + name,
                        content: encSw
                    });
                }).then(function() {
                    log.innerHTML += '<br><span class="ok">✓ sw.js</span><br>' +
                        '<span class="ok"><b>Done! PWA 3-file scaffold complete.</b></span>';
                    btn.disabled = false;
                });
            })
            .catch(function(err) {
                log.innerHTML += '<br><span class="err">✗ ' + err.message + '</span>';
                btn.disabled = false;
            });
        }

        // ── Modal ──
        function openModal(id) {
            document.getElementById(id).classList.add('open');
            if (id === 'newToolModal') {
                var sel = document.getElementById('ntCat');
                if (sel.options.length < 2) {
                    sel.innerHTML = '';
                    CAT_ORDER.forEach(function(k) {
                        var opt = document.createElement('option');
                        opt.value = k; opt.textContent = CAT_LABELS[k] || k;
                        sel.appendChild(opt);
                    });
                }
            }
        }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        function saveToken() {
            var t = document.getElementById('tokenInput').value.trim();
            if (!t) return;
            var st = document.getElementById('tokenStatus');
            st.innerHTML = '<span class="wait">Verifying...</span>';
            fetch('https://api.github.com/user', {
                headers: { 'Authorization': 'Bearer ' + t, 'Accept': 'application/vnd.github.v3+json' }
            })
            .then(function(r) { return r.json(); })
            .then(function(u) {
                if (u.login) {
                    localStorage.setItem(TK, t);
                    st.innerHTML = '<span class="ok">✓ Connected as ' + u.login + '</span>';
                    setTimeout(function() { closeModal('tokenModal'); renderFactoryBar(); }, 800);
                } else {
                    st.innerHTML = '<span class="err">Invalid token</span>';
                }
            })
            .catch(function(err) { st.innerHTML = '<span class="err">' + err.message + '</span>'; });
        }

        return {
            createTool: createTool,
            openModal: openModal,
            closeModal: closeModal,
            saveToken: saveToken,
            startPipeline: startPipeline
        };
    })();
    </script>
    <script src="./shared/js/nav.js"></script>
</body>
</html>
