<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="DTSLIB Tools — 브라우저에서 바로 사용하는 도구함">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">

    <title>DTSLIB Tools</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #000;
            --bg-card: #1C1C1E;
            --text: #F5F5F7;
            --text-sec: rgba(245,245,247,0.6);
            --text-dim: rgba(245,245,247,0.35);
            --blue: #0A84FF;
            --sep: rgba(255,255,255,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: calc(52px + env(safe-area-inset-top)) 0 0;
        }

        .page { max-width: 600px; margin: 0 auto; padding: 24px 20px 60px; }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 28px;
        }

        .group { margin-bottom: 24px; }

        .group-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 4px;
            margin-bottom: 8px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .tool-card {
            display: flex;
            flex-direction: column;
            padding: 16px 14px;
            background: var(--bg-card);
            border-radius: 14px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, background 0.2s;
        }

        .tool-card:hover { background: #2C2C2E; }
        .tool-card:active { transform: scale(0.97); }

        .tool-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .tool-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .tool-desc {
            font-size: 11px;
            color: var(--text-sec);
            line-height: 1.4;
        }

        .tool-ver {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: auto;
            padding-top: 8px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--sep);
            margin-top: 16px;
        }

        .footer a {
            font-size: 12px;
            color: var(--blue);
            text-decoration: none;
        }

        .footer-brand {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1 class="page-title">도구함</h1>
        <p class="page-sub">9 tools — browser-native</p>

        <div id="toolsContainer"></div>

        <div class="footer">
            <a href="https://github.com/dtslib1979/dtslib-cloud-appstore" target="_blank">GitHub</a>
            <div class="footer-brand">DTSLIB TOOLS</div>
        </div>
    </div>

    <script>
        var TOOLS = [
            { id: 'lecture-shorts', name: 'Lecture Shorts', desc: '4분→3분 쇼츠 변환', icon: '🎓', group: '영상' },
            { id: 'lecture-long',   name: 'Lecture Long',   desc: '16분→12분 튜토리얼', icon: '📹', group: '영상' },
            { id: 'auto-shorts',   name: 'Auto Shorts',    desc: '6~30초→2분 변환', icon: '🎬', group: '영상' },
            { id: 'clip-shorts',   name: 'Clip Shorts',    desc: '클립 조합 + BGM', icon: '🎞️', group: '영상' },
            { id: 'audio-studio',  name: 'Audio Studio',   desc: '오디오 컷 & 루프', icon: '🎵', group: '오디오' },
            { id: 'slim-lens',     name: 'Slim Lens',      desc: '사진 가로 슬림', icon: '📷', group: '이미지' },
            { id: 'image-pack',    name: 'Image Pack',     desc: '플랫폼별 이미지 규격', icon: '📦', group: '이미지' },
            { id: 'bilingual-aligner', name: 'Bilingual Aligner', desc: '한영 정렬 & 텔레프롬프터', icon: '📘', group: '유틸' },
            { id: 'project-manager',   name: 'Project Manager',   desc: '메타데이터 & 출하 관리', icon: '📋', group: '유틸' }
        ];

        var versions = {};

        document.addEventListener('DOMContentLoaded', function() {
            fetch('./apps.json')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.apps) d.apps.forEach(function(a) { versions[a.id] = a.version; });
                })
                .catch(function() {})
                .finally(render);
        });

        function render() {
            var container = document.getElementById('toolsContainer');
            var groups = ['영상', '오디오', '이미지', '유틸'];
            var html = '';

            groups.forEach(function(g) {
                var items = TOOLS.filter(function(t) { return t.group === g; });
                html += '<div class="group">';
                html += '<div class="group-title">' + g + '</div>';
                html += '<div class="tools-grid">';
                items.forEach(function(t) {
                    var ver = versions[t.id] || '';
                    html += '<a href="./' + t.id + '/" class="tool-card">' +
                        '<div class="tool-icon">' + t.icon + '</div>' +
                        '<div class="tool-name">' + t.name + '</div>' +
                        '<div class="tool-desc">' + t.desc + '</div>' +
                        '<div class="tool-ver">' + (ver ? 'v' + ver : '') + '</div>' +
                    '</a>';
                });
                html += '</div></div>';
            });

            container.innerHTML = html;
        }
    </script>
    <script src="./shared/js/nav.js"></script>
</body>
</html>
